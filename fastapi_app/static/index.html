<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>YOLOv26 License Plate Realtime Demo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app">
        <section class="panel topPanel">
            <div class="controls">
                <label class="upload">
                    Tải video
                    <input id="videoInput" type="file" accept="video/*">
                </label>

                <button id="startBtn" disabled>Bắt đầu</button>
                <button id="stopBtn" disabled>Dừng</button>
                <button id="finishBtn" disabled>Kết thúc</button>
            </div>

            <div class="statusBox">
                <div>Trạng thái: <b id="statusText">Chưa tải video</b></div>
                <div>Tổng số biển số tốt nhất phát hiện được: <b id="totalText">0</b></div>
            </div>
        </section>

        <section class="panel">
            <h1>Video phát hiện biển số</h1>

            <div class="videoOuter">
                <div class="videoWrap">
                    <video id="video" controls muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>
        </section>

        <section class="panel">
            <h1>Kết quả crop & OCR</h1>
            <div id="results" class="results">
                <p>Chưa có kết quả OCR.</p>
            </div>
        </section>
    </main>

    <script src="/static/app.js?v=50"></script>
</body>
</html>
