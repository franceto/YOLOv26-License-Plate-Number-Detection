<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>YOLOv26 License Plate Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app">
        <section class="hero">
            <div>
                <h1>YOLOv26 License Plate Detection</h1>
                <p>Video player + bbox realtime + OCR top crop</p>
            </div>
            <div class="badge">FastAPI + HTML5 Canvas</div>
        </section>

        <section class="panel">
            <div class="controls">
                <div class="upload-box">
                    <input id="videoInput" type="file" accept="video/mp4,video/webm,video/quicktime">
                </div>

                <div class="field">
                    <span>Confidence</span>
                    <input id="conf" type="range" min="0.1" max="0.9" step="0.05" value="0.45">
                    <b id="confVal">0.45</b>
                </div>

                <div class="field">
                    <span>Image size</span>
                    <select id="imgsz">
                        <option value="416">416</option>
                        <option value="512" selected>512</option>
                        <option value="640">640</option>
                        <option value="768">768</option>
                    </select>
                </div>

                <button id="startBtn">Start detect</button>
                <button id="stopBtn">Stop</button>
                <button id="ocrBtn">OCR top crop</button>
            </div>

            <div class="status">
                <div>Trạng thái: <b id="status">Chưa tải video</b></div>
                <div>Latency: <b id="latency">0 ms</b></div>
                <div>Top crop: <b id="topCount">0</b></div>
                <div>Auto delay: <b id="delay">0 ms</b></div>
            </div>
        </section>

        <section class="video-card">
            <div class="video-wrap" id="videoWrap">
                <video id="video" controls></video>
                <canvas id="overlay"></canvas>
            </div>
        </section>

        <section class="results">
            <h2>Kết quả OCR</h2>
            <div id="ocrResults" class="ocr-grid"></div>
        </section>
    </main>

    <canvas id="sendCanvas" hidden></canvas>
    <script src="/static/app.js?v=5" defer></script>
</body>
</html>
